<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esquema Temporal: Actualización de Cuotas</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- KaTeX para renderizado matemático -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        .math-expr {
            transition: opacity 0.4s ease-in-out, transform 0.4s ease-out;
            opacity: 0;
            transform: translateX(15px);
        }
        .math-expr.visible {
            opacity: 1;
            transform: translateX(0);
        }
        .arrow-path {
            fill: none;
            stroke: #2563eb;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .katex-display {
            margin: 0 !important;
            padding-top: 5px;
        }
        input[type="range"] {
            accent-color: #2563eb;
        }
        /* Ocultar elementos inactivos de pestañas */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans flex flex-col items-center">

    <div class="max-w-6xl w-full bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
        
        <!-- Cabecera -->
        <div class="bg-slate-800 text-white p-6 text-center">
            <h1 class="text-2xl md:text-3xl font-bold tracking-wide">Actualización de Cuotas en Progresión Aritmética</h1>
            <p class="text-slate-300 mt-2">Razonamiento de Fransolini interactivo</p>
        </div>

        <!-- Pestañas de Navegación -->
        <div class="flex border-b border-slate-200 bg-slate-50">
            <button id="tabBtnTeorico" class="flex-1 py-4 text-center font-bold text-blue-700 border-b-4 border-blue-600 bg-white transition-colors">Planteo Teórico</button>
            <button id="tabBtnPractico" class="flex-1 py-4 text-center font-bold text-slate-500 border-b-4 border-transparent hover:bg-slate-100 transition-colors">Ejemplo Práctico</button>
        </div>

        <!-- ======================================================= -->
        <!-- PESTAÑA 1: PLANTEO TEÓRICO -->
        <!-- ======================================================= -->
        <div id="tabTeorico" class="tab-content active">
            <!-- Controles Animación -->
            <div class="p-6 bg-slate-100 border-b border-slate-200 flex flex-col xl:flex-row items-center justify-between gap-6">
                <div class="flex-1 w-full">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Progreso de Actualización: <span id="progTextTeo" class="text-blue-600">0%</span></label>
                    <input type="range" id="progSliderTeo" min="0" max="100" value="0" class="w-full h-2 bg-slate-300 rounded-lg appearance-none cursor-pointer">
                </div>
                <div class="flex flex-wrap md:flex-nowrap gap-3 w-full xl:w-auto items-end">
                    <button id="btnPlayTeo" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg shadow transition-colors flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path></svg> Desplegar
                    </button>
                    <button id="btnResetTeo" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-800 font-semibold py-2 px-6 rounded-lg shadow transition-colors flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> Reiniciar
                    </button>
                    <div class="w-full md:w-48 flex flex-col">
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Velocidad: <span id="speedValTeo">1.0x</span></label>
                        <input type="range" id="speedTeo" min="1.5" max="1.5" step="0.25" value="1.5" class="w-full h-2 bg-slate-300 rounded-lg appearance-none cursor-pointer">
                    </div>
                </div>
            </div>

            <!-- Gráfico Teórico -->
            <div class="relative w-full overflow-x-auto bg-white" style="min-height: 850px;">
                <svg class="w-full min-w-[1000px]" viewBox="0 0 1000 850" preserveAspectRatio="xMidYMid meet">
                    <defs>
                        <!-- Punta de flecha apuntando hacia la izquierda -->
                        <marker id="arrow-teo" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
                            <polygon points="0 0, 0 7, 10 3.5" fill="#2563eb" />
                        </marker>
                    </defs>

                    <!-- Eje base -->
                    <line x1="220" y1="80" x2="960" y2="80" stroke="#334155" stroke-width="2" />
                    <!-- Quiebre // -->
                    <rect x="680" y="60" width="40" height="40" fill="white" />
                    <line x1="690" y1="95" x2="700" y2="65" stroke="#334155" stroke-width="2" />
                    <line x1="700" y1="95" x2="710" y2="65" stroke="#334155" stroke-width="2" />

                    <!-- Ticks -->
                    <g class="text-slate-700 font-sans" text-anchor="middle">
                        <line x1="250" y1="75" x2="250" y2="85" stroke="#334155" stroke-width="2" />
                        <text x="250" y="60" class="font-semibold text-sm">t=0</text>
                        <text x="250" y="110" class="font-bold text-sm fill-slate-800">EV=EI</text>

                        <line x1="370" y1="75" x2="370" y2="85" stroke="#334155" stroke-width="2" />
                        <text x="370" y="60" class="font-semibold text-sm">t=1</text><text x="370" y="110" class="font-semibold text-sm fill-blue-800">c</text>

                        <line x1="490" y1="75" x2="490" y2="85" stroke="#334155" stroke-width="2" />
                        <text x="490" y="60" class="font-semibold text-sm">t=2</text><text x="490" y="110" class="font-semibold text-sm fill-blue-800">c + r</text>

                        <line x1="610" y1="75" x2="610" y2="85" stroke="#334155" stroke-width="2" />
                        <text x="610" y="60" class="font-semibold text-sm">t=3</text><text x="610" y="110" class="font-semibold text-sm fill-blue-800">c + 2r</text>

                        <line x1="810" y1="75" x2="810" y2="85" stroke="#334155" stroke-width="2" />
                        <text x="810" y="60" class="font-semibold text-sm">t=n-1</text><text x="810" y="110" class="font-semibold text-sm fill-blue-800">c + (n-2)r</text>

                        <line x1="930" y1="75" x2="930" y2="85" stroke="#334155" stroke-width="2" />
                        <text x="930" y="60" class="font-semibold text-sm">t=n</text><text x="930" y="110" class="font-semibold text-sm fill-blue-800">c + (n-1)r</text>
                    </g>

                    <!-- Rutas (Sin el marker-end inicial para que no floten en 0%) -->
                    <path data-teo-path="1" class="arrow-path" d="M 370 120 L 370 190 Q 370 200 360 200 L 265 200" />
                    <path data-teo-path="2" class="arrow-path" d="M 490 120 L 490 280 Q 490 290 480 290 L 265 290" />
                    <path data-teo-path="3" class="arrow-path" d="M 610 120 L 610 370 Q 610 380 600 380 L 265 380" />
                    <path data-teo-path="4" class="arrow-path" d="M 810 120 L 810 500 Q 810 510 800 510 L 265 510" />
                    <path data-teo-path="5" class="arrow-path" d="M 930 120 L 930 590 Q 930 600 920 600 L 265 600" />

                    <!-- Fórmulas -->
                    <foreignObject x="0" y="135" width="250" height="120">
                        <div data-teo-math="1" class="math-expr w-full h-full flex justify-end items-center pr-2">
                            <span class="text-lg">$$\frac{c}{(1+i)^1}$$</span>
                        </div>
                    </foreignObject>
                    <foreignObject x="0" y="225" width="250" height="120">
                        <div data-teo-math="2" class="math-expr w-full h-full flex justify-end items-center pr-2">
                            <span class="text-lg">$$\frac{c + r}{(1+i)^2}$$</span>
                        </div>
                    </foreignObject>
                    <foreignObject x="0" y="315" width="250" height="120">
                        <div data-teo-math="3" class="math-expr w-full h-full flex justify-end items-center pr-2">
                            <span class="text-lg">$$\frac{c + 2 \cdot r}{(1+i)^3}$$</span>
                        </div>
                    </foreignObject>
                    <!-- Puntos -->
                    <foreignObject x="0" y="420" width="250" height="50">
                        <div id="math-dots-teo" class="math-expr w-full h-full flex justify-end items-center pr-10">
                            <span class="text-xl">$$\vdots$$</span>
                        </div>
                    </foreignObject>
                    <foreignObject x="0" y="445" width="250" height="120">
                        <div data-teo-math="4" class="math-expr w-full h-full flex justify-end items-center pr-2">
                            <span class="text-lg">$$\frac{c + (n-2) \cdot r}{(1+i)^{n-1}}$$</span>
                        </div>
                    </foreignObject>
                    <foreignObject x="0" y="535" width="250" height="120">
                        <div data-teo-math="5" class="math-expr w-full h-full flex justify-end items-center pr-2">
                            <span class="text-lg">$$\frac{c + (n-1) \cdot r}{(1+i)^n}$$</span>
                        </div>
                    </foreignObject>

                    <!-- Línea sólida y Sumatoria Final (Planteo Teórico) -->
                    <line id="total-line-Teo" class="math-expr" x1="50" y1="670" x2="280" y2="670" stroke="#94a3b8" stroke-width="2" />
                    <foreignObject x="50" y="680" width="900" height="120">
                        <div id="math-total-Teo" class="math-expr w-full h-full flex justify-center items-start text-blue-800 font-bold">
                            <span class="text-xl">$$V_n^a = \frac{c}{1+i} + \frac{c+r}{(1+i)^2} + \frac{c+2 \cdot r}{(1+i)^3} + \dots + \frac{c+(n-2) \cdot r}{(1+i)^{n-1}} + \frac{c+(n-1) \cdot r}{(1+i)^n}$$</span>
                        </div>
                    </foreignObject>
                </svg>
            </div>
        </div>

        <!-- ======================================================= -->
        <!-- PESTAÑA 2: EJEMPLO PRÁCTICO -->
        <!-- ======================================================= -->
        <div id="tabPractico" class="tab-content">
            
            <!-- Panel de Controles Variables (1 Fila) -->
            <div class="p-6 bg-blue-50 border-b border-blue-100 grid grid-cols-2 lg:grid-cols-4 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Cuota Inicial ($c$): <span id="valC" class="text-blue-600">1000</span></label>
                    <input type="range" id="varC" min="500" max="5000" step="100" value="1000" class="w-full h-2 bg-slate-300 rounded-lg appearance-none cursor-pointer">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Tasa Int. ($i$): <span id="valI" class="text-blue-600">5%</span></label>
                    <input type="range" id="varI" min="1" max="20" step="1" value="5" class="w-full h-2 bg-slate-300 rounded-lg appearance-none cursor-pointer">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Cant. Cuotas ($n$): <span id="valN" class="text-blue-600">4</span></label>
                    <input type="range" id="varN" min="2" max="6" step="1" value="4" class="w-full h-2 bg-slate-300 rounded-lg appearance-none cursor-pointer">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Razón ($r$): <span id="valR" class="text-blue-600">+ 200</span></label>
                    <input type="range" id="varR" min="-500" max="1000" step="50" value="200" class="w-full h-2 bg-slate-300 rounded-lg appearance-none cursor-pointer">
                </div>
            </div>

            <!-- Controles Animación -->
            <div class="p-6 bg-slate-100 border-b border-slate-200 flex flex-col xl:flex-row items-center justify-between gap-6">
                <div class="flex-1 w-full">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Progreso: <span id="progTextPrac" class="text-blue-600">0%</span></label>
                    <input type="range" id="progSliderPrac" min="0" max="100" value="0" class="w-full h-2 bg-slate-300 rounded-lg appearance-none cursor-pointer">
                </div>
                <div class="flex flex-wrap md:flex-nowrap gap-3 w-full xl:w-auto items-end">
                    <button id="btnPlayPrac" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg shadow transition-colors flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path></svg> Desplegar
                    </button>
                    <button id="btnResetPrac" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-800 font-semibold py-2 px-6 rounded-lg shadow transition-colors flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> Reiniciar
                    </button>
                    <div class="w-full md:w-48 flex flex-col">
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Velocidad: <span id="speedValPrac">1.0x</span></label>
                        <input type="range" id="speedPrac" min="1.5" max="1.5" step="0.25" value="1.5" class="w-full h-2 bg-slate-300 rounded-lg appearance-none cursor-pointer">
                    </div>
                </div>
            </div>

            <!-- Gráfico Práctico Dinámico (Adaptable en Altura) -->
            <div class="relative w-full overflow-x-auto bg-white transition-all duration-500">
                <svg id="svgPractico" style="width: 100%; min-width: 900px; transition: height 0.5s ease;" preserveAspectRatio="xMidYMid meet">
                    <!-- Se inyectará desde JS -->
                </svg>
            </div>
        </div>
    </div>

    <!-- SCRIPTS LÓGICOS -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {

            // ==========================================
            // LÓGICA DE PESTAÑAS
            // ==========================================
            const tabBtnTeo = document.getElementById('tabBtnTeorico');
            const tabBtnPrac = document.getElementById('tabBtnPractico');
            const tabTeo = document.getElementById('tabTeorico');
            const tabPrac = document.getElementById('tabPractico');

            tabBtnTeo.addEventListener('click', () => {
                tabTeo.classList.add('active'); tabPrac.classList.remove('active');
                tabBtnTeo.className = "flex-1 py-4 text-center font-bold text-blue-700 border-b-4 border-blue-600 bg-white transition-colors";
                tabBtnPrac.className = "flex-1 py-4 text-center font-bold text-slate-500 border-b-4 border-transparent hover:bg-slate-100 transition-colors";
            });

            tabBtnPrac.addEventListener('click', () => {
                tabPrac.classList.add('active'); tabTeo.classList.remove('active');
                tabBtnPrac.className = "flex-1 py-4 text-center font-bold text-blue-700 border-b-4 border-blue-600 bg-white transition-colors";
                tabBtnTeo.className = "flex-1 py-4 text-center font-bold text-slate-500 border-b-4 border-transparent hover:bg-slate-100 transition-colors";
                renderPractico(); // Renderizar al activar por si hubo cambios
            });


            // ==========================================
            // MOTOR DE ANIMACIÓN (requestAnimationFrame)
            // ==========================================
            class TimelineAnimator {
                constructor(prefix, numItems) {
                    this.prefix = prefix;
                    this.numItems = numItems;
                    this.slider = document.getElementById(`progSlider${prefix}`);
                    this.progText = document.getElementById(`progText${prefix}`);
                    this.btnPlay = document.getElementById(`btnPlay${prefix}`);
                    this.btnReset = document.getElementById(`btnReset${prefix}`);
                    this.speedSlider = document.getElementById(`speed${prefix}`);
                    this.speedVal = document.getElementById(`speedVal${prefix}`);
                    
                    this.paths = [];
                    this.pathLengths = [];
                    this.formulas = [];
                    this.mathTotal = document.getElementById(`math-total-${prefix}`);
                    this.mathDots = document.getElementById(`math-dots-${prefix}`);
                    this.totalLine = document.getElementById(`total-line-${prefix}`);
                    
                    this.animationFrameId = null;
                    this.isPlaying = false;
                    
                    // Bind Events
                    this.slider.addEventListener('input', (e) => { this.stopAutoPlay(); this.update(parseFloat(e.target.value)); });
                    this.btnPlay.addEventListener('click', () => this.togglePlay());
                    this.btnReset.addEventListener('click', () => { this.stopAutoPlay(); this.slider.value = 0; this.update(0); });
                    this.speedSlider.addEventListener('input', (e) => { this.speedVal.textContent = parseFloat(e.target.value).toFixed(1) + 'x'; });
                }

                initDOM() {
                    this.paths = [];
                    this.pathLengths = [];
                    this.formulas = [];
                    for(let i=1; i<=this.numItems; i++) {
                        let path = document.querySelector(`[data-${this.prefix.toLowerCase()}-path="${i}"]`);
                        let form = document.querySelector(`[data-${this.prefix.toLowerCase()}-math="${i}"]`);
                        if(path && form) {
                            this.paths.push(path);
                            this.formulas.push(form);
                            let len = path.getTotalLength();
                            this.pathLengths.push(len);
                            path.style.strokeDasharray = len;
                            path.style.strokeDashoffset = len;
                        }
                    }
                    this.mathTotal = document.getElementById(`math-total-${this.prefix}`);
                    this.mathDots = document.getElementById(`math-dots-${this.prefix}`);
                    this.totalLine = document.getElementById(`total-line-${this.prefix}`);
                    this.update(parseFloat(this.slider.value));
                }

                update(value) {
                    this.progText.textContent = Math.round(value) + '%';
                    const segments = this.numItems + 1; // +1 para el total al final
                    const segmentSize = 100 / segments;
                    const markerUrl = `url(#arrow-${this.prefix.toLowerCase()})`;

                    for (let i = 0; i < this.numItems; i++) {
                        const start = i * segmentSize;
                        const end = start + segmentSize;
                        
                        if (value <= start) {
                            this.paths[i].style.strokeDashoffset = this.pathLengths[i];
                            this.paths[i].removeAttribute('marker-end'); // Ocultar punta de flecha al inicio
                            this.formulas[i].classList.remove('visible');
                        } else if (value >= end) {
                            this.paths[i].style.strokeDashoffset = 0;
                            this.paths[i].setAttribute('marker-end', markerUrl); // Mostrar punta de flecha al final
                            this.formulas[i].classList.add('visible');
                        } else {
                            const localProgress = (value - start) / segmentSize;
                            this.paths[i].style.strokeDashoffset = this.pathLengths[i] * (1 - localProgress);
                            
                            // Mostrar la punta de flecha justo antes de que termine para evitar que viaje flotando
                            if (localProgress > 0.95) {
                                this.paths[i].setAttribute('marker-end', markerUrl);
                            } else {
                                this.paths[i].removeAttribute('marker-end');
                            }

                            if(localProgress > 0.8) this.formulas[i].classList.add('visible');
                            else this.formulas[i].classList.remove('visible');
                        }
                    }

                    // Puntos suspensivos en Teórico (después de 3ra cuota)
                    if(this.mathDots) {
                        if (value >= segmentSize * 3) this.mathDots.classList.add('visible');
                        else this.mathDots.classList.remove('visible');
                    }

                    // Total final
                    if (value >= 99) {
                        if(this.mathTotal) this.mathTotal.classList.add('visible');
                        if(this.totalLine) this.totalLine.classList.add('visible');
                    } else {
                        if(this.mathTotal) this.mathTotal.classList.remove('visible');
                        if(this.totalLine) this.totalLine.classList.remove('visible');
                    }
                }

                stopAutoPlay() {
                    this.isPlaying = false;
                    if (this.animationFrameId) {
                        cancelAnimationFrame(this.animationFrameId);
                        this.animationFrameId = null;
                    }
                    this.btnPlay.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path></svg> Desplegar`;
                }

                togglePlay() {
                    if (this.isPlaying) {
                        this.stopAutoPlay();
                    } else {
                        if (parseFloat(this.slider.value) >= 100) { this.slider.value = 0; this.update(0); }
                        this.isPlaying = true;
                        this.btnPlay.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Pausar`;
                        
                        let lastTime = performance.now();
                        const loop = (currentTime) => {
                            if (!this.isPlaying) return;
                            
                            const dt = currentTime - lastTime;
                            lastTime = currentTime;
                            
                            // Velocidad base ajustada
                            let speedMultiplier = parseFloat(this.speedSlider.value);
                            let increment = 0.02 * speedMultiplier * dt;
                            
                            let currentVal = parseFloat(this.slider.value);
                            if (currentVal >= 100) {
                                this.stopAutoPlay();
                            } else {
                                currentVal = Math.min(100, currentVal + increment);
                                this.slider.value = currentVal;
                                this.update(currentVal);
                                this.animationFrameId = requestAnimationFrame(loop);
                            }
                        };
                        this.animationFrameId = requestAnimationFrame(loop);
                    }
                }
            }

            // Inicializar Animador Teórico
            const animTeo = new TimelineAnimator('Teo', 5);
            animTeo.initDOM();


            // ==========================================
            // RENDERIZADO DEL EJEMPLO PRÁCTICO + ABSURDO
            // ==========================================
            let animPrac = new TimelineAnimator('Prac', 4);

            const varC = document.getElementById('varC'); const valC = document.getElementById('valC');
            const varI = document.getElementById('varI'); const valI = document.getElementById('valI');
            const varN = document.getElementById('varN'); const valN = document.getElementById('valN');
            const varR = document.getElementById('varR'); const valR = document.getElementById('valR');

            // Variables para prevenir el Absurdo Financiero
            let lastValidC = varC.value;
            let lastValidN = varN.value;
            let lastValidR = varR.value;

            function updateLabels() {
                valC.textContent = "$ " + varC.value;
                valI.textContent = varI.value + "%";
                valN.textContent = varN.value;
                valR.textContent = (parseInt(varR.value) > 0 ? "+ " : "") + "$ " + varR.value;
            }

            [varC, varI, varN, varR].forEach(el => el.addEventListener('input', () => {
                const c = parseFloat(varC.value);
                const r = parseFloat(varR.value);
                const n = parseInt(varN.value);
                
                // Evitar el Absurdo Financiero (Cuota final <= 0)
                if (c + (n - 1) * r <= 0) {
                    varC.value = lastValidC;
                    varN.value = lastValidN;
                    varR.value = lastValidR;
                    return; // Abortamos la actualización para no permitir la variable
                }

                // Si es válido, guardamos los valores como el último estado seguro
                lastValidC = varC.value;
                lastValidN = varN.value;
                lastValidR = varR.value;

                updateLabels();
                renderPractico();
            }));

            function renderPractico() {
                const c = parseFloat(varC.value);
                const r = parseFloat(varR.value);
                const i = parseFloat(varI.value) / 100;
                const n = parseInt(varN.value);
                
                const svg = document.getElementById('svgPractico');
                
                // Limpiar SVG
                svg.innerHTML = `
                    <defs>
                        <!-- Puntas de flecha a la izquierda -->
                        <marker id="arrow-prac" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
                            <polygon points="0 0, 0 7, 10 3.5" fill="#2563eb" />
                        </marker>
                    </defs>
                `;

                const baseWidth = 1000;
                const startY = 80;
                const x0 = 250;
                const endX = 950;
                const spacingX = (endX - x0) / n;
                const spacingY = 90;
                
                // Calcular la altura requerida (Responsive Height)
                const finalElementsY = startY + 50 + (n * spacingY) + 150;
                const svgHeight = Math.max(500, finalElementsY);

                // Ajustar SVG para que expanda su contenedor
                svg.setAttribute('viewBox', `0 0 ${baseWidth} ${svgHeight}`);
                svg.style.height = svgHeight + 'px';

                // Eje Principal
                let htmlStr = `<line x1="${x0-30}" y1="${startY}" x2="${endX+10}" y2="${startY}" stroke="#334155" stroke-width="2" />`;
                
                // t=0
                htmlStr += `<line x1="${x0}" y1="${startY-5}" x2="${x0}" y2="${startY+5}" stroke="#334155" stroke-width="2" />
                            <text x="${x0}" y="${startY-15}" class="font-semibold text-sm text-slate-700" text-anchor="middle">t=0</text>`;

                let totalVa = 0;

                for (let j = 1; j <= n; j++) {
                    const cuota = c + (j-1)*r;
                    const denom = Math.pow(1+i, j);
                    const va = cuota / denom;
                    totalVa += va;

                    const xj = x0 + j * spacingX;
                    const yj = startY + 50 + (j * spacingY);

                    // Eje Ticks y Valores Cuota
                    htmlStr += `
                        <line x1="${xj}" y1="${startY-5}" x2="${xj}" y2="${startY+5}" stroke="#334155" stroke-width="2" />
                        <text x="${xj}" y="${startY-15}" class="font-semibold text-sm text-slate-700" text-anchor="middle">t=${j}</text>
                        <text x="${xj}" y="${startY+25}" class="font-bold text-sm fill-blue-800" text-anchor="middle">$ ${cuota}</text>
                    `;

                    // Arrow Paths (Se quita el marker-end inicial del código estático)
                    htmlStr += `<path data-prac-path="${j}" class="arrow-path" d="M ${xj} ${startY+35} L ${xj} ${yj} Q ${xj} ${yj+10} ${xj-10} ${yj+10} L ${x0+80} ${yj+10}" />`;

                    // Formato Valor (Fix decimals)
                    const formatVa = va.toFixed(2).replace('.', ',');
                    
                    // Formulas en ForeignObject
                    htmlStr += `
                        <foreignObject x="-50" y="${yj-45}" width="330" height="110">
                            <div data-prac-math="${j}" class="math-expr w-full h-full flex justify-end items-center pr-4">
                                <span class="text-base text-slate-800">$$\\frac{${cuota}}{(1+${i.toString().replace('.',',')})^${j}} = \\mathbf{${formatVa}}$$</span>
                            </div>
                        </foreignObject>
                    `;
                }

                // Total Final bajo la columna (Suma Tradicional)
                const formatTotal = totalVa.toFixed(2).replace('.', ',');
                const lineY = startY + 50 + (n * spacingY) + 65;
                
                // Línea divisoria sólida alineada bajo los números
                htmlStr += `
                    <line id="total-line-Prac" class="math-expr" x1="${x0-80}" y1="${lineY}" x2="${x0+80}" y2="${lineY}" stroke="#94a3b8" stroke-width="2" />
                    
                    <foreignObject x="-50" y="${lineY + 10}" width="330" height="90">
                        <div id="math-total-Prac" class="math-expr w-full h-full flex justify-end items-start pr-4 text-blue-800 font-bold">
                            <span class="text-lg">$$V_n^a = \\mathbf{${formatTotal}}$$</span>
                        </div>
                    </foreignObject>
                `;

                svg.innerHTML += htmlStr;

                // Actualizar Animador
                animPrac.stopAutoPlay();
                animPrac.numItems = n;
                document.getElementById('progSliderPrac').value = 0;
                animPrac.initDOM();

                // Aplicar KaTeX a los elementos creados dinámicamente
                renderMathInElement(svg, {
                    delimiters: [{left: '$$', right: '$$', display: true}],
                    throwOnError: false
                });
            }

            // Iniciar por primera vez
            updateLabels();
            renderPractico();
            
            // KaTeX global
            renderMathInElement(document.body, {
                delimiters: [{left: '$$', right: '$$', display: true}],
                throwOnError: false
            });

        });
    </script>
</body>
</html>
