<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Diagrama Dinámico de Flujo de Actualización Retrospectiva</title>
  <!-- KaTeX CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-color: #f1f5f9;
      --text-muted: #94a3b8;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --emerald: #10b981;
      --blue: #06b6d4;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Plus Jakarta Sans', sans-serif;
      padding: 1.5rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      max-width: 1200px;
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border-color);
      border-radius: 1.5rem;
      padding: 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(16px);
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 2rem;
    }

    @media (max-width: 1024px) {
      .container {
        grid-template-columns: 1fr;
      }
    }

    .visualizer-section {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .header {
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1rem;
    }

    .header h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    .canvas-container {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 1.25rem;
      position: relative;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Cards */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }

    .stat-card {
      background: rgba(30, 41, 59, 0.4);
      border: 1px solid var(--border-color);
      border-radius: 1rem;
      padding: 1.25rem;
      position: relative;
      overflow: hidden;
      transition: var(--transition);
    }

    .stat-card:hover {
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
    }

    .stat-card.capitalizacion::before {
      background: var(--emerald);
    }

    .stat-card.actualizacion::before {
      background: var(--blue);
    }

    .stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .stat-val {
      font-size: 1.35rem;
      font-weight: 800;
      font-family: 'Space Grotesk', sans-serif;
    }

    .stat-formula {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
    }

    /* Sidebar controls */
    .controls-sidebar {
      background: rgba(30, 41, 59, 0.3);
      border: 1px solid var(--border-color);
      border-radius: 1.25rem;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .control-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .control-header label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-color);
    }

    .control-header span {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--primary);
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      outline: none;
      transition: var(--transition);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--primary);
      cursor: pointer;
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
      transition: var(--transition);
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    /* Mode Buttons */
    .mode-selector {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--border-color);
      border-radius: 0.75rem;
      padding: 0.25rem;
    }

    .mode-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.6rem;
      border-radius: 0.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: var(--transition);
    }

    .mode-btn.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .explanation-card {
      background: rgba(99, 102, 241, 0.05);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: 1rem;
      padding: 1.25rem;
      font-size: 0.85rem;
      line-height: 1.6;
    }

    .explanation-card h4 {
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 0.35rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .comparison-badge {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 0.35rem;
      font-size: 0.75rem;
      font-weight: 700;
      margin-top: 0.5rem;
    }

    .comparison-badge.ok {
      background: rgba(16, 185, 129, 0.15);
      color: var(--emerald);
      border: 1px solid rgba(16, 185, 129, 0.25);
    }

    .comparison-badge.fail {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.25);
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- Visualizer Section -->
    <div class="visualizer-section">
      <div class="header">
        <h2>Capitalización vs. Actualización</h2>
        <p>Contrasta visualmente los procesos de acumulación de interés y descuento retrospectivo.</p>
      </div>

      <div class="canvas-container">
        <canvas id="flowCanvas"></canvas>
      </div>

      <!-- Live Cards -->
      <div class="cards-grid">
        <!-- Capitalización -->
        <div class="stat-card capitalizacion">
          <div class="stat-label">
            <span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--emerald);"></span>
            Proceso de Capitalización
          </div>
          <div class="stat-val" id="capVal">$0.00</div>
          <div class="stat-formula" id="mathFormulaCap"></div>
        </div>

        <!-- Actualización -->
        <div class="stat-card actualizacion">
          <div class="stat-label">
            <span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--blue);"></span>
            Proceso de Actualización
          </div>
          <div class="stat-val" id="actVal">$0.00</div>
          <div class="stat-formula" id="mathFormulaAct"></div>
        </div>
      </div>
    </div>

    <!-- Sidebar Section -->
    <div class="controls-sidebar">
      
      <!-- Régimen -->
      <div class="control-group">
        <label style="font-size:0.85rem; font-weight:600; margin-bottom:0.25rem;">Régimen Financiero</label>
        <div class="mode-selector">
          <button id="btnSimple" class="mode-btn active" onclick="setRegimen('simple')">Simple Comercial</button>
          <button id="btnCompuesto" class="mode-btn" onclick="setRegimen('compuesto')">Racional Compuesto</button>
        </div>
      </div>

      <!-- Nominal -->
      <div class="control-group">
        <div class="control-header">
          <label for="inputN">Valor Nominal (<span id="katexN"></span>)</label>
          <span id="labelN">$1,000</span>
        </div>
        <input type="range" id="inputN" min="500" max="2000" step="100" value="1000" oninput="updateValues()">
      </div>

      <!-- Tasa -->
      <div class="control-group">
        <div class="control-header">
          <label for="inputRate">Tasa Mensual (<span id="katexRate"></span>)</label>
          <span id="labelRate">4.0%</span>
        </div>
        <input type="range" id="inputRate" min="1" max="7" step="0.5" value="4" oninput="updateValues()">
      </div>

      <!-- Plazo -->
      <div class="control-group">
        <div class="control-header">
          <label for="inputTime">Antelación / Plazo (<span id="katexTime"></span>)</label>
          <span id="labelTime">6 meses</span>
        </div>
        <input type="range" id="inputTime" min="1" max="12" step="1" value="6" oninput="updateValues()">
      </div>

      <!-- Nota Conceptual -->
      <div class="explanation-card">
        <h4>💡 Nota Conceptual</h4>
        <span id="explanationText"></span>
        <div id="reversibilityBadge" class="comparison-badge"></div>
      </div>

    </div>

  </div>

  <!-- KaTeX library -->
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  
  <script>
    // Variables de estado
    let regimen = 'simple'; // 'simple' o 'compuesto'
    let N = 1000;
    let rate = 0.04;
    let n = 6;

    // Elementos del DOM
    const canvas = document.getElementById('flowCanvas');
    const ctx = canvas.getContext('2d');
    
    // Sliders & Labels
    const inputN = document.getElementById('inputN');
    const inputRate = document.getElementById('inputRate');
    const inputTime = document.getElementById('inputTime');
    const labelN = document.getElementById('labelN');
    const labelRate = document.getElementById('labelRate');
    const labelTime = document.getElementById('labelTime');
    
    // Cards & Textos
    const capVal = document.getElementById('capVal');
    const actVal = document.getElementById('actVal');
    const explanationText = document.getElementById('explanationText');
    const reversibilityBadge = document.getElementById('reversibilityBadge');

    // Partículas para animación
    let particlesCap = [];
    let particlesAct = [];
    const maxParticles = 30;

    // Inicializar KaTeX
    function initKaTeX() {
      katex.render("N", document.getElementById('katexN'));
      katex.render("d = i", document.getElementById('katexRate'));
      katex.render("n", document.getElementById('katexTime'));
    }

    // Cambiar Régimen
    function setRegimen(type) {
      regimen = type;
      document.getElementById('btnSimple').classList.toggle('active', type === 'simple');
      document.getElementById('btnCompuesto').classList.toggle('active', type === 'compuesto');
      updateValues();
    }

    // Configurar partículas
    function initParticles() {
      particlesCap = [];
      particlesAct = [];
      for (let i = 0; i < maxParticles; i++) {
        particlesCap.push({
          progress: Math.random(),
          speed: 0.002 + Math.random() * 0.003
        });
        particlesAct.push({
          progress: Math.random(),
          speed: 0.002 + Math.random() * 0.003
        });
      }
    }

    // Actualizar valores numéricos y matemáticos
    function updateValues() {
      N = parseFloat(inputN.value);
      rate = parseFloat(inputRate.value) / 100;
      n = parseInt(inputTime.value);

      labelN.innerText = `$${N.toLocaleString()}`;
      labelRate.innerText = `${(rate * 100).toFixed(1)}%`;
      labelTime.innerText = `${n} ${n === 1 ? 'mes' : 'meses'}`;

      let D, V, C, M, I;

      if (regimen === 'simple') {
        // Descuento Simple Comercial
        D = N * rate * n;
        V = N - D;
        // Inversión equivalente en capitalización simple
        C = V;
        I = C * rate * n;
        M = C + I;
      } else {
        // Descuento Racional Compuesto
        V = N * Math.pow(1 + rate, -n);
        D = N - V;
        // Inversión equivalente en compuesto
        C = V;
        M = C * Math.pow(1 + rate, n);
        I = M - C;
      }

      // Evitar valores negativos en DCS por el límite de aplicabilidad
      const limiteExcedido = (regimen === 'simple' && n >= (1 / rate));

      // Renderizar valores en las tarjetas
      actVal.innerText = `$${Math.max(0, V).toFixed(2)}`;
      capVal.innerText = `$${M.toFixed(2)}`;

      // Renderizar fórmulas con KaTeX en tiempo real
      if (regimen === 'simple') {
        katex.render(`M = ${C.toFixed(2)} + ${I.toFixed(2)} = ${M.toFixed(2)}`, document.getElementById('mathFormulaCap'));
        katex.render(`V = ${N} - ${D.toFixed(2)} = ${V.toFixed(2)}`, document.getElementById('mathFormulaAct'));
      } else {
        katex.render(`M = ${C.toFixed(2)} \\cdot (1 + ${rate})^{${n}} = ${M.toFixed(2)}`, document.getElementById('mathFormulaCap'));
        katex.render(`V = ${N} \\cdot (1 + ${rate})^{-${n}} = ${V.toFixed(2)}`, document.getElementById('mathFormulaAct'));
      }

      // Actualizar Nota Conceptual
      if (regimen === 'simple') {
        if (limiteExcedido) {
          explanationText.innerHTML = `⚠️ **Límite de Aplicabilidad Superado**: Con una tasa del ${(rate * 100).toFixed(1)}% mensual, el plazo de antelación máximo admisible es de <strong>${Math.floor(1/rate)} meses</strong>. A los ${n} meses, el descuento ($${D.toFixed(0)}) supera al valor nominal, resultando en un valor actual negativo ($${V.toFixed(2)}), lo cual carece de sentido económico.`;
          reversibilityBadge.className = "comparison-badge fail";
          reversibilityBadge.innerText = "Operación Inviable";
        } else {
          explanationText.innerHTML = `En el Descuento Comercial Simple, el descuento se calcula sobre el Nominal original ($${N}). Nótese que si invertimos el valor actual recibido ($${V.toFixed(2)}) a la misma tasa y por el mismo plazo, obtenemos un monto capitalizado final ($M = $${M.toFixed(2)}) que <strong>no llega a recomponer</strong> el nominal de $${N}. Esto ilustra la <strong>irracionalidad</strong> y falta de reversibilidad del régimen simple.`;
          reversibilityBadge.className = "comparison-badge fail";
          katex.render(`M \\neq N \\quad (${M.toFixed(0)} < ${N})`, reversibilityBadge);
        }
      } else {
        explanationText.innerHTML = `En el Descuento Racional Compuesto, se respeta la <strong>ley de equivalencia y reversibilidad</strong>. Si tomamos el valor actual calculado retrospectivamente ($${V.toFixed(2)}) y lo capitalizamos por el mismo plazo y tasa de interés, el monto obtenido ($M$) vuelve a ser <strong>exactamente igual</strong> al valor nominal de $${N}.`;
        reversibilityBadge.className = "comparison-badge ok";
        katex.render(`M = N \\quad (${M.toFixed(0)} = ${N})`, reversibilityBadge);
      }
    }

    // Redimensionar Canvas
    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * window.devicePixelRatio;
      canvas.height = rect.height * window.devicePixelRatio;
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    }

    // Dibujar Canvas
    function draw() {
      const w = canvas.width / window.devicePixelRatio;
      const h = canvas.height / window.devicePixelRatio;
      
      ctx.clearRect(0, 0, w, h);

      // Parámetros de diseño
      const paddingX = 80;
      const axisY = h / 2;
      const flowOffsetY = 45;
      
      const startX = paddingX;
      const endX = w - paddingX;
      const lengthX = endX - startX;

      // 1. Dibujar eje de tiempo
      ctx.beginPath();
      ctx.moveTo(startX - 20, axisY);
      ctx.lineTo(endX + 20, axisY);
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Ticks de tiempo
      const steps = n;
      for (let i = 0; i <= steps; i++) {
        const x = startX + (i / steps) * lengthX;
        ctx.beginPath();
        ctx.moveTo(x, axisY - 5);
        ctx.lineTo(x, axisY + 5);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Etiquetas del eje
        ctx.fillStyle = '#64748b';
        ctx.font = '10px "Plus Jakarta Sans"';
        ctx.textAlign = 'center';
        if (i === 0) {
          ctx.fillText('t=0 (Hoy)', x, axisY + 20);
        } else if (i === steps) {
          ctx.fillText(`t=n (${n}m)`, x, axisY + 20);
        } else {
          ctx.fillText(`t=${i}`, x, axisY + 20);
        }
      }

      // Calcular radios de los círculos basados en los valores
      let D, V, C, M;
      if (regimen === 'simple') {
        D = N * rate * n;
        V = Math.max(0, N - D);
        C = V;
        M = C * (1 + rate * n);
      } else {
        V = N * Math.pow(1 + rate, -n);
        D = N - V;
        C = V;
        M = C * Math.pow(1 + rate, n);
      }

      // Escalar radios para representación visual
      const minRadius = 12;
      const maxRadius = 32;
      
      // Radio base para Nominal N
      const rN = maxRadius * (N / 2000);
      // Radio para Valor Actual V (proporcional al valor relativo a N)
      const rV = Math.max(minRadius, rN * (V / N));
      // Radio para Capital C (igual a V)
      const rC = rV;
      // Radio para Monto M (proporcional a M relativo a N)
      const rM = Math.max(minRadius, rN * (M / N));

      // --- FLECHA SUPERIOR (CAPITALIZACIÓN) ---
      const capY = axisY - flowOffsetY;
      ctx.beginPath();
      ctx.moveTo(startX, capY);
      ctx.lineTo(endX, capY);
      ctx.strokeStyle = 'rgba(16, 185, 129, 0.15)';
      ctx.lineWidth = 4;
      ctx.stroke();

      // Cabeza de la flecha de capitalización
      ctx.beginPath();
      ctx.moveTo(endX - 10, capY - 6);
      ctx.lineTo(endX, capY);
      ctx.lineTo(endX - 10, capY + 6);
      ctx.fillStyle = 'rgba(16, 185, 129, 0.6)';
      ctx.fill();

      // Dibujar partículas de capitalización (izquierda a derecha)
      particlesCap.forEach(p => {
        p.progress += p.speed;
        if (p.progress > 1) p.progress = 0;
        const pX = startX + p.progress * (endX - startX);
        
        ctx.beginPath();
        ctx.arc(pX, capY, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = '#10b981';
        ctx.shadowColor = '#10b981';
        ctx.shadowBlur = 6;
        ctx.fill();
        ctx.shadowBlur = 0; // Limpiar sombra
      });

      // --- FLECHA INFERIOR (ACTUALIZACIÓN) ---
      const actY = axisY + flowOffsetY;
      ctx.beginPath();
      ctx.moveTo(endX, actY);
      ctx.lineTo(startX, actY);
      ctx.strokeStyle = 'rgba(6, 182, 212, 0.15)';
      ctx.lineWidth = 4;
      ctx.stroke();

      // Cabeza de la flecha de actualización
      ctx.beginPath();
      ctx.moveTo(startX + 10, actY - 6);
      ctx.lineTo(startX, actY);
      ctx.lineTo(startX + 10, actY + 6);
      ctx.fillStyle = 'rgba(6, 182, 212, 0.6)';
      ctx.fill();

      // Dibujar partículas de actualización (derecha a izquierda)
      particlesAct.forEach(p => {
        p.progress -= p.speed;
        if (p.progress < 0) p.progress = 1;
        const pX = startX + p.progress * (endX - startX);
        
        ctx.beginPath();
        ctx.arc(pX, actY, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = '#06b6d4';
        ctx.shadowColor = '#06b6d4';
        ctx.shadowBlur = 6;
        ctx.fill();
        ctx.shadowBlur = 0; // Limpiar sombra
      });

      // --- CÍRCULOS DE ESTADO ---
      
      // 1. Capitalización: Capital Inicial C (t=0)
      ctx.beginPath();
      ctx.arc(startX, capY, rC, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(16, 185, 129, 0.2)';
      ctx.strokeStyle = '#10b981';
      ctx.lineWidth = 2.5;
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = '#10b981';
      ctx.font = 'bold 11px "Space Grotesk"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(`C = $${C.toFixed(0)}`, startX, capY);

      // 2. Capitalización: Monto M (t=n)
      ctx.beginPath();
      ctx.arc(endX, capY, rM, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(16, 185, 129, 0.2)';
      ctx.strokeStyle = '#10b981';
      ctx.lineWidth = 2.5;
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = '#10b981';
      ctx.font = 'bold 11px "Space Grotesk"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(`M = $${M.toFixed(0)}`, endX, capY);

      // 3. Actualización: Valor Nominal N (t=n)
      ctx.beginPath();
      ctx.arc(endX, actY, rN, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(6, 182, 212, 0.2)';
      ctx.strokeStyle = '#06b6d4';
      ctx.lineWidth = 2.5;
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = '#06b6d4';
      ctx.font = 'bold 11px "Space Grotesk"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(`N = $${N.toFixed(0)}`, endX, actY);
      
      // Etiqueta "Dato Conocido" sobre N
      ctx.fillStyle = '#a5f3fc';
      ctx.font = '8px "Plus Jakarta Sans"';
      ctx.fillText('Dato Conocido', endX, actY - rN - 8);

      // 4. Actualización: Valor Actual V (t=0)
      ctx.beginPath();
      ctx.arc(startX, actY, rV, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(6, 182, 212, 0.2)';
      ctx.strokeStyle = '#06b6d4';
      ctx.lineWidth = 2.5;
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = '#06b6d4';
      ctx.font = 'bold 11px "Space Grotesk"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(`V = $${V.toFixed(0)}`, startX, actY);

      // 3. Leyendas de proceso
      ctx.font = '600 12px "Space Grotesk"';
      ctx.fillStyle = '#10b981';
      ctx.textAlign = 'left';
      ctx.fillText('Capitalización (Flujo Directo t=0 → t=n)', startX, capY - rC - 10);

      ctx.fillStyle = '#06b6d4';
      ctx.textAlign = 'left';
      ctx.fillText('Actualización Retrospectiva (t=n → t=0)', startX, actY + rV + 15);

      requestAnimationFrame(draw);
    }

    // Inicializaciones
    window.addEventListener('resize', () => {
      resizeCanvas();
      updateValues();
    });

    // Start
    initKaTeX();
    resizeCanvas();
    initParticles();
    updateValues();
    
    // Lanzar loop de animación
    draw();
  </script>
</body>
</html>
